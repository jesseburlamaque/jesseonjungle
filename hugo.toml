baseURL = 'https://example.org/'
locale = 'pt-BR'
title = 'JesseonJungle'
theme = 'compost'
enableEmoji = true
enableRobotsTXT = true

[params]
  description = 'Jesse on Jungle - Um blog sobre tecnologia e desenvolvimento'
  colorScheme = 'light'

  [params.author]
    name = 'Jessé Burlamaque'
    image = 'img/author.jpg'
    bio = 'Um pouco sobre você'

[build]
  writeStats = true

[[build.cachebusters]]
  source = "assets/watching/hugo_stats\\.json"
  target = "main\\.css"

[[build.cachebusters]]
  source = "(postcss|tailwind)\\.config\\.js"
  target = "css"

[[build.cachebusters]]
  source = "assets/.*\\.(js|ts|jsx|tsx)"
  target = "js"

[[build.cachebusters]]
  source = "assets/.*\\.(.*)$"
  target = "$1"

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true
