baseURL = 'https://jesseburlamaque.github.io/jesseonjungle/'
locale = 'pt-BR'
title = 'JesseonJungle'
theme = 'compost'
enableEmoji = true
enableRobotsTXT = true

[params]
  description = 'GIS, sensoriamento remoto, LiDAR, biomassa e carbono florestal. Notas de campo de quem trabalha com dados ambientais.'
  colorScheme = 'light'
  mainSections = ['posts']

  [params.author]
    name = 'Jessé Burlamaque'
    image = 'img/author.jpg'
    bio = 'GIS Specialist | Sensoriamento Remoto | LiDAR | Biomassa & Carbono Florestal'
    links = [
      { github = 'https://github.com/jesseburlamaque' },
      { linkedin = 'https://www.linkedin.com/in/jesseburlamaque/' },
      { medium = 'https://medium.com/@jesseburlamaque' },
    ]

  [params.homepage]
    layout = 'page'
    showRecent = true

[build]
  writeStats = true

[[build.cachebusters]]
  source = "assets/watching/hugo_stats\\.json"
  target = "main\\.css"

[[build.cachebusters]]
  source = "(postcss|tailwind)\\.config\\.js"
  target = "css"

[[build.cachebusters]]
  source = "assets/.*\\.(js|ts|jsx|tsx)"
  target = "js"

[[build.cachebusters]]
  source = "assets/.*\\.(.*)$"
  target = "$1"

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepQuotes = true
